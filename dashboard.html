<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SigDocIn — главная</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-extrabold text-blue-700">SigDocIn</h1>
        <span class="text-sm font-semibold text-blue-500 bg-blue-50 px-2 py-1 rounded">SDI</span>
      </div>
      <div class="flex items-center gap-6">
        <button id="theme-toggle" class="text-gray-600 hover:text-gray-900 text-xl transition">
          <i class="fas fa-moon"></i>
        </button>
        <span class="current-user text-gray-700 font-medium hidden md:inline"></span>
        <button onclick="logout()" class="flex items-center gap-2 text-red-600 hover:text-red-800 transition">
          <i class="fas fa-sign-out-alt"></i>
          <span>Выйти</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-12">
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold text-gray-900">Добро пожаловать в SigDocIn</h2>
      <p class="text-gray-600 mt-3 text-lg">Электронная подпись документов внутри компании</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <a href="organizations.html" class="dashboard-card">
        <div class="dashboard-card-content">
          <i class="fas fa-building text-blue-600"></i>
          <h3>Организации</h3>
          <p>Создание и управление компаниями</p>
        </div>
      </a>

      <a href="employees.html" class="dashboard-card">
        <div class="dashboard-card-content">
          <i class="fas fa-users text-green-600"></i>
          <h3>Сотрудники</h3>
          <p>Добавление и управление людьми</p>
        </div>
      </a>

      <a href="documents.html" class="dashboard-card">
        <div class="dashboard-card-content">
          <i class="fas fa-file-signature text-purple-600"></i>
          <h3>Документы</h3>
          <p>Рассылка и подпись документов</p>
        </div>
      </a>
    </div>
  </main>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const icon = themeToggle.querySelector('i');

    function updateIcon() {
      if (document.documentElement.classList.contains('dark')) {
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
      } else {
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');
      }
    }

    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
      updateIcon();
    });

    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }
    updateIcon();
  </script>
</body>
</html>
