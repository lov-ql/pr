<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SigDocIn — Организации</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

  <main class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-8">Организации</h1>

    <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-lg border border-gray-200 dark:border-gray-700 mb-10">
      <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Создать новую организацию</h2>
      <form id="createOrgForm" class="flex flex-col sm:flex-row gap-4">
        <input type="text" id="orgName" placeholder="Название организации" required
               class="flex-1 px-5 py-4 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-semibold transition">
          Создать
        </button>
      </form>
    </div>

    <h2 class="text-2xl font-bold mb-6 text-gray-900 dark:text-white">Ваши организации</h2>
    <div id="orgList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <div id="toast" class="hidden"></div>

  <script src="script.js"></script>
  <script>
    function renderOrgs() {
      const list = document.getElementById('orgList');
      const orgs = getOrganizations();
      list.innerHTML = orgs.length ? orgs.map(org => `
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow border border-gray-200 dark:border-gray-700">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-xl font-bold text-gray-900 dark:text-white">${org.name}</h3>
              <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">ID: ${org.id}</p>
            </div>
            <div class="flex gap-3">
              <a href="departments.html?org=${org.id}" class="text-blue-600 dark:text-blue-400 hover:underline">
                Отделы
              </a>
              <a href="employees.html?org=${org.id}" class="text-green-600 dark:text-green-400 hover:underline">
                Сотрудники
              </a>
            </div>
          </div>
        </div>
      `).join('') : '<p class="text-center py-12 text-gray-500 dark:text-gray-400 col-span-full">Нет организаций</p>';
    }

    document.getElementById('createOrgForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('orgName').value.trim();
      if (!name) return;
      const orgs = getOrganizations();
      const newOrg = { id: Date.now().toString(), name };
      orgs.push(newOrg);
      saveOrganizations(orgs);
      showToast('Организация создана');
      renderOrgs();
      e.target.reset();
    });

    renderOrgs();
  </script>
</body>
</html>
