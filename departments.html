<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SigDocIn — Отделы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
  <main class="max-w-6xl mx-auto px-4 py-10">
    <a href="organizations.html" class="inline-flex items-center text-blue-600 dark:text-blue-400 hover:underline mb-6">
      ← Назад к организациям
    </a>

    <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-8">
      Отделы организации
    </h1>

    <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-lg border border-gray-200 dark:border-gray-700 mb-10">
      <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Добавить отдел</h2>
      <form id="addDeptForm" class="flex flex-col sm:flex-row gap-4">
        <input type="text" id="deptName" placeholder="Название отдела" required
               class="flex-1 px-5 py-4 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-semibold transition">
          Добавить
        </button>
      </form>
    </div>

    <h2 class="text-2xl font-bold mb-6 text-gray-900 dark:text-white">Существующие отделы</h2>
    <div id="deptList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <div id="toast" class="hidden"></div>

  <script src="script.js"></script>
  <script>
    const urlParams = new URLSearchParams(location.search);
    const orgId = urlParams.get('org');
    if (!orgId) location.href = 'organizations.html';

    function renderDepts() {
      const list = document.getElementById('deptList');
      const depts = getDepartments(orgId);
      list.innerHTML = depts.length ? depts.map(d => `
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow border border-gray-200 dark:border-gray-700">
          <h3 class="text-xl font-bold text-gray-900 dark:text-white">${d.name}</h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Создан: ${new Date(parseInt(d.id)).toLocaleDateString('ru-RU')}</p>
        </div>
      `).join('') : '<p class="text-center py-12 text-gray-500 dark:text-gray-400 col-span-full">Нет отделов</p>';
    }

    document.getElementById('addDeptForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('deptName').value.trim();
      if (!name) return;
      const depts = getDepartments(orgId);
      depts.push({ id: Date.now().toString(), name });
      saveDepartments(orgId, depts);
      showToast('Отдел добавлен');
      renderDepts();
      e.target.reset();
    });

    renderDepts();
  </script>
</body>
</html>
