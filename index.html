<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SigDocIn — вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-b from-blue-50 to-white">
  <div class="max-w-md w-full px-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-extrabold text-blue-700 tracking-tight">SigDocIn</h1>
      <p class="text-xl text-gray-600 mt-1 font-medium">SDI</p>
      <p class="text-gray-500 mt-3">Подпись документов внутри компании</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-2xl font-bold text-center mb-8 text-gray-800">Вход / Регистрация</h2>

      <form id="authForm">
        <div class="mb-6">
          <label class="block text-gray-700 font-medium mb-2">Номер телефона</label>
          <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required
                 class="w-full px-5 py-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg">
        </div>

        <div class="mb-8">
          <label class="block text-gray-700 font-medium mb-2">Пароль</label>
          <input type="password" id="password" required
                 class="w-full px-5 py-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg">
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl text-lg font-semibold hover:bg-blue-700 transition">
          Войти
        </button>
      </form>

      <p class="text-center text-gray-500 mt-6 text-sm">
        Регистрация автоматическая при первом входе
      </p>
    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
  <script>
    document.getElementById('authForm').addEventListener('submit', e => {
      e.preventDefault();
      const phone = document.getElementById('phone').value.trim();
      if (phone.length < 10) {
        showToast('Введите корректный номер', 'error');
        return;
      }
      setCurrentUser({ phone, role: 'admin' });
      showToast('Добро пожаловать в SigDocIn!');
      setTimeout(() => location.href = 'dashboard.html', 900);
    });
  </script>
</body>
</html>
